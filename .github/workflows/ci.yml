name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancela runs antigas do mesmo PR/branch quando há novo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Adapte para sua stack. Exemplos:
      #
      # Para Node.js:
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #     cache: 'npm'
      # - run: npm ci
      # - run: npm run lint
      #
      # Para Python:
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.11'
      #     cache: 'pip'
      # - run: pip install -r requirements-dev.txt
      # - run: ruff check .
      # - run: black --check .

      - name: Placeholder
        run: echo "Configure o linter da sua stack aqui"

  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Exemplos:
      #
      # Node:
      # - run: npm test -- --coverage
      #
      # Python:
      # - run: pytest --cov

      - name: Placeholder
        run: echo "Configure os testes da sua stack aqui"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Configure o build da sua stack aqui"

  pr-validation:
    name: Valida título do PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            O título do PR deve começar com letra minúscula após o tipo.
            Exemplo: feat: adicionar sensor de temperatura
